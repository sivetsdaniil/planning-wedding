<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель - Eternal Moments</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #faf9f7; color: #333; padding: 40px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #d4a373; text-align: center; margin-bottom: 30px; }
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { flex: 1; background: #faf9f7; border-radius: 8px; padding: 15px; text-align: center; }
        .stat-card .num { font-size: 2em; font-weight: 600; color: #d4a373; }
        .stat-card .label { font-size: 0.85em; color: #888; }
        .comment-item { border: 1px solid #eee; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .comment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .comment-name { font-weight: 600; }
        .comment-date { font-size: 0.8em; color: #888; }
        .comment-rating { color: #d4af37; }
        .comment-text { color: #555; margin: 8px 0; }
        .badge { font-size: 0.75em; padding: 3px 8px; border-radius: 10px; margin-left: 8px; }
        .badge-pending { background: #fff3cd; color: #856404; }
        .badge-approved { background: #d4edda; color: #155724; }
        .actions { display: flex; gap: 8px; margin-top: 10px; }
        .actions button { padding: 6px 14px; border: none; border-radius: 5px; cursor: pointer; font-size: 0.85em; transition: 0.2s; }
        .btn-approve { background: #d4edda; color: #155724; }
        .btn-hide { background: #fff3cd; color: #856404; }
        .btn-delete { background: #f8d7da; color: #721c24; }
        .btn-approve:hover { background: #c3e6cb; }
        .btn-hide:hover { background: #ffeaa7; }
        .btn-delete:hover { background: #f5c6cb; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #d4a373; text-decoration: none; }
        .empty { text-align: center; color: #888; padding: 40px; }
        .filter-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .filter-tab { padding: 8px 16px; border: 1px solid #ddd; border-radius: 20px; cursor: pointer; font-size: 0.85em; background: white; }
        .filter-tab.active { background: #d4a373; color: white; border-color: #d4a373; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Панель управления отзывами</h1>

        <div class="stats">
            <div class="stat-card">
                <div class="num" id="stat-total">0</div>
                <div class="label">Всего отзывов</div>
            </div>
            <div class="stat-card">
                <div class="num" id="stat-approved">0</div>
                <div class="label">Одобрено</div>
            </div>
            <div class="stat-card">
                <div class="num" id="stat-pending">0</div>
                <div class="label">Ожидают</div>
            </div>
            <div class="stat-card">
                <div class="num" id="stat-avg">0</div>
                <div class="label">Средний рейтинг</div>
            </div>
        </div>

        <div class="filter-tabs">
            <button class="filter-tab active" onclick="setFilter('all', this)">Все</button>
            <button class="filter-tab" onclick="setFilter('pending', this)">Ожидают</button>
            <button class="filter-tab" onclick="setFilter('approved', this)">Одобренные</button>
        </div>

        <div id="reviews-list"></div>

        <a href="index.html" class="back-link">← Вернуться на сайт</a>
    </div>

    <script>
        let allReviews = [];
        let currentFilter = 'all';

        const load = async () => {
            try {
                const res = await fetch('/api/auth/admin/reviews');
                allReviews = await res.json();
                updateStats();
                render();
            } catch(e) { console.error(e); }
        };

        const updateStats = () => {
            const approved = allReviews.filter(r => r.approved).length;
            const pending = allReviews.length - approved;
            const avg = allReviews.length 
                ? (allReviews.reduce((s, r) => s + (r.rating || 0), 0) / allReviews.length).toFixed(1)
                : 0;
            document.getElementById('stat-total').textContent = allReviews.length;
            document.getElementById('stat-approved').textContent = approved;
            document.getElementById('stat-pending').textContent = pending;
            document.getElementById('stat-avg').textContent = avg;
        };

        const render = () => {
            const list = document.getElementById('reviews-list');
            let reviews = allReviews;
            if (currentFilter === 'pending') reviews = allReviews.filter(r => !r.approved);
            if (currentFilter === 'approved') reviews = allReviews.filter(r => r.approved);

            if (reviews.length === 0) {
                list.innerHTML = '<div class="empty">Отзывов нет</div>';
                return;
            }

            list.innerHTML = reviews.map(r => `
                <div class="comment-item" id="rev-${r.id}">
                    <div class="comment-header">
                        <div>
                            <span class="comment-name">${r.name || 'Гость'}</span>
                            <span class="badge ${r.approved ? 'badge-approved' : 'badge-pending'}">
                                ${r.approved ? 'Одобрен' : 'Ожидает'}
                            </span>
                        </div>
                        <span class="comment-date">${new Date(r.created_at).toLocaleDateString('ru-RU')}</span>
                    </div>
                    ${r.rating ? `<div class="comment-rating">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>` : ''}
                    <div class="comment-text">${r.text}</div>
                    <div class="actions">
                        ${!r.approved 
                            ? `<button class="btn-approve" onclick="approve(${r.id}, true)">✓ Одобрить</button>`
                            : `<button class="btn-hide" onclick="approve(${r.id}, false)">✕ Скрыть</button>`
                        }
                        <button class="btn-delete" onclick="remove(${r.id})">Удалить</button>
                    </div>
                </div>
            `).join('');
        };

        const approve = async (id, approved) => {
            await fetch(`/api/auth/admin/reviews/${id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ approved })
            });
            load();
        };

        const remove = async (id) => {
            if (!confirm('Удалить отзыв?')) return;
            await fetch(`/api/auth/admin/reviews/${id}`, { method: 'DELETE' });
            load();
        };

        const setFilter = (filter, btn) => {
            currentFilter = filter;
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            render();
        };

        load();
        setInterval(load, 5000);
    </script>
</body>
</html>
